<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳击课打卡追踪器</title>
    <style>
        :root { --main-red: #d32f2f; --dark-bg: #1a1a1a; --card-bg: #2d2d2d; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--dark-bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* 进度条样式 */
        .stats { background: var(--card-bg); width: 100%; max-width: 400px; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .progress-bar { height: 12px; background: #444; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        #progress-fill { height: 100%; background: var(--main-red); width: 0%; transition: width 0.3s; }
        
        /* 日历样式 */
        .calendar-container { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 12px; padding: 15px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-label { font-size: 12px; color: #888; padding-bottom: 5px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; border: 1px solid #444; font-size: 14px; transition: 0.2s; }
        .day:hover { border-color: var(--main-red); }
        .day.checked { background: var(--main-red); border-color: var(--main-red); font-weight: bold; }
        .day.other-month { opacity: 0.2; cursor: default; }
        .btn { background: none; border: 1px solid #888; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stats">
        <h2>🥊 我的拳击进度</h2>
        <div id="stats-text">已完成: 0 / 32</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="btn" onclick="changeMonth(-1)">◀</button>
            <h3 id="month-display">2026年4月</h3>
            <button class="btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="days-grid" id="days-grid">
            </div>
    </div>

    <script>
        let currentMonth = new Date();
        const totalClasses = 32;
        // 从本地存储读取打卡数据，格式：['2026-04-01', '2026-04-03']
        let attendance = JSON.parse(localStorage.getItem('boxingAttendance')) || [];

        function renderCalendar() {
            const grid = document.getElementById('days-grid');
            const monthDisplay = document.getElementById('month-display');
            grid.innerHTML = '';

            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            monthDisplay.innerText = `${year}年${month + 1}月`;

            // 生成星期表头
            ['日','一','二','三','四','五','六'].forEach(d => {
                grid.innerHTML += `<div class="day-label">${d}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // 填充空白
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day other-month"></div>`;
            }

            // 填充日期
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isChecked = attendance.includes(dateStr);
                const dayEl = document.createElement('div');
                dayEl.className = `day ${isChecked ? 'checked' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => toggleDate(dateStr);
                grid.appendChild(dayEl);
            }
            updateStats();
        }

        function toggleDate(dateStr) {
            const index = attendance.indexOf(dateStr);
            if (index > -1) {
                attendance.splice(index, 1);
            } else {
                if (attendance.length < totalClasses) {
                    attendance.push(dateStr);
                } else {
                    alert("已经打满 32 节课啦！超棒！");
                }
            }
            localStorage.setItem('boxingAttendance', JSON.stringify(attendance));
            renderCalendar();
        }

        function updateStats() {
            const count = attendance.length;
            document.getElementById('stats-text').innerText = `已完成: ${count} / ${totalClasses}`;
            document.getElementById('progress-fill').style.width = `${(count / totalClasses) * 100}%`;
        }

        function changeMonth(step) {
            currentMonth.setMonth(currentMonth.getMonth() + step);
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>
</html>
